name: Focus — Download e extração

on:
  schedule:
    - cron: "15 12 * * 1"  # toda segunda-feira às 12h15 UTC (9h15 BRT)
  workflow_dispatch:        # permite disparo manual pela UI do GitHub

jobs:
  download:
    name: Baixar PDF e extrair texto
    runs-on: ubuntu-latest

    permissions:
      contents: write  # necessário para commitar os artefatos gerados

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Baixar o PDF do Focus
        run: python src/baixar_focus.py

      - name: Extrair o texto do PDF
        run: python src/extrair_texto.py

      - name: Commitar artefatos (se houver novidade)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/focus_*.pdf data/focus_*.txt
          # diff --cached retorna 0 se não há nada staged → pula o commit
          git diff --cached --quiet && echo "Nada novo para commitar." \
            || git commit -m "chore: Focus $(date +%Y-%m-%d)"
          git push
